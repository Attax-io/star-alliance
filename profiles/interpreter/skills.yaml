# Skills owned by the Interpreter profile.
# Curated from the 94-skill inventory and agents/the-interpreter.md's frontmatter.
# Only skills genuinely belonging to the Interpreter's craft (legal codex loading,
# law translation, multi-locale content, contracts, client correspondence, bilingual
# legal instruments, jurisdiction shifts). Shared house skills kept where the
# Interpreter is the primary owner; cross-craft skills (e.g. transactions-domain-model,
# spec-driven-development, design-taste) belong to other profiles.

- name: codex-law-translate
  reason: End-to-end pipeline for loading a real-world law into the legal codex, translating into every non-Arabic locale, and adversarially revising — the Interpreter's defining craft.

- name: law-harvest
  reason: When the source law arrives as a raw PDF — ingest it into the Source Law library verbatim (Arabic canonical, page ranges intact) before it enters the codex.

- name: legal-rule-modeling
  reason: When the Interpreter feeds the Architect the prose behind a statute — the inputs, brackets, exemptions, edge cases — that becomes a calculator's deterministic rules.

- name: legal-drafting
  reason: The Interpreter's craft for client correspondence and bilingual legal instruments — contracts, declarations, resignation letters, memos, client emails.

- name: contract-review
  reason: When the other side has drafted the contract — read it, name the risks, surface what the client should push back on, without rewriting the deal.

- name: article-creator
  reason: When the deliverable is a public Insights article — push it to the production DB in all six locales, side-by-side, never half-finished.

- name: obsidian-markdown
  reason: For any documentation the Interpreter writes — wikilinks, callouts, properties, and the guild's reading protocol live in Obsidian flavor.

- name: ux-copywriting
  reason: When a client-facing gloss has to land on a screen and read like the firm's voice — only invoked for client correspondence / consent / disclaimer surfaces, never as a general copywriting tool.

- name: voices-check
  reason: When torn between legal registers — formal Arabic, French legal, plain client English — integrate them into one coherent translation rather than fragmenting across locales.

- name: star-alliance-language
  reason: Universal guild idiom — speak and write in the Star Alliance's plain-English register, especially when reporting back to the Butler or the Guild Master.

- name: weapon-utility
  reason: The numeric usage-level meter — every member, skill, and workflow has a level derived from append-only invocation logs (tools/xp.py + the post-tool xp-log hook). Read it before invoking a skill to know whether it's load-bearing or has gone cold at level 1. The Interpreter also uses it to flag skill edits that would touch load-bearing craft (treated as regressions) versus skill retirement candidates. Does NOT select weapons — model selection lives in star-alliance-arsenal/.

- name: dual-model-review
  reason: The cross-system bridge's quality gate — MiniMax-M3 produces the translation draft, Kimi K2.7 + GLM-5.2 fire as parallel reviewer sub-agents through Hermes; both must PASS before the report goes back. The Interpreter tunes the reviewer prompts to check legal register (voices-check) and source-fidelity (codex-law-translate) — the doer cannot be the only interpreter's eye on a statute.
model:
  default: "opus"
  provider: "ollama-launch"
  api_key: "ollama"
  base_url: "http://127.0.0.1:11434/v1"

providers:
  ollama-launch:
    api: http://127.0.0.1:11434/v1
    default_model: glm-5.2:cloud
    models:
      - glm-5.2:cloud
      - kimi-k2.7-code:cloud
      - minimax-m3:cloud
      - deepseek-v4-pro:cloud
    name: Ollama

terminal:
  backend: local
  timeout: 180

_config_version: 31
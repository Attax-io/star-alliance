# (relationship care, support triage, escalation, empathetic drafting).

- name: relationship-intel
  reason: When scattered client signals must become structured relationship intelligence — satisfaction trends, retention risk, the shape of an account over time.

- name: comms-triage
  reason: When a flood of inbound messages must be sorted into signal / noise / risk before anyone drafts a single reply.

- name: star-alliance-language
  reason: Universal guild idiom — speak and write in the Star Alliance's plain-English register; pass jargon-free summaries up the chain.

- name: weapon-utility

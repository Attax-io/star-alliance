model:
  default: MiniMax-M3
  provider: custom:minimax-sub
  primary: custom:minimax-sub
  fallback: custom:minimax-payg

providers:
  custom:minimax-sub:
    api: https://api.minimax.io/v1
    default_model: MiniMax-M3
    key_env: MINIMAX_SUB_KEY
    models:
      - MiniMax-M3
      - glm-5.2
    name: MiniMax Sub
  custom:minimax-payg:
    api: https://api.minimax.io/v1
    default_model: MiniMax-M3
    key_env: MINIMAX_PAYG_KEY
    models:
      - MiniMax-M3
      - glm-5.2
    name: MiniMax PayG
  ollama-launch:
    api: http://127.0.0.1:11434/v1
    default_model: glm-5.2:cloud
    models:
      - glm-5.2:cloud
      - kimi-k2.7-code:cloud
      - minimax-m3:cloud
      - deepseek-v4-pro:cloud
    name: Ollama

terminal:
  backend: local
  timeout: 180

_config_version: 31
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Star Alliance — Guild Dashboard</title>
<style>
:root{
  --bg:#f5f3ef;
  --surface:#ffffff;
  --surface2:#faf9f6;
  --border:#e2ddd3;
  --border2:#d0c9bb;
  --txt:#2a2620;
  --mut:#7a7468;
  --hint:#a59e90;
  --gold:#b89530;
  --gold-light:#e8c93a;
  --gold-bg:#faf5e6;
  --blue:#3b7dd8;
  --green:#3da155;
  --purple:#7c5dc8;
  --pink:#d54d7a;
  --teal:#2ba89a;
  --red:#c4382a;
  --shadow:rgba(0,0,0,.06);
  --blue-bg:#eef4fc;
  --purple-bg:#f3effb;
  --green-bg:#e8f6ec;
  --teal-bg:#e4f5f3;
  --red-bg:#fcebe9;
}
[data-theme="dark"]{
  --bg:#1c1b19;
  --surface:#262522;
  --surface2:#2d2c29;
  --border:#3a3833;
  --border2:#4a4842;
  --txt:#ece9e2;
  --mut:#a8a69d;
  --hint:#807e76;
  --gold:#d4ac4e;
  --gold-light:#e8c93a;
  --gold-bg:#2a2515;
  --blue:#6ab0e8;
  --green:#5dca5d;
  --purple:#a67cf2;
  --pink:#e85d8a;
  --teal:#3ec5b8;
  --red:#f0564e;
  --shadow:rgba(0,0,0,.25);
  --blue-bg:#0d1f2d;
  --purple-bg:#1a1530;
  --green-bg:#0d2018;
  --teal-bg:#0d2020;
  --red-bg:#2d1010;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--bg);color:var(--txt);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Georgia,sans-serif;
  font-size:14px;line-height:1.6;
}
::selection{background:rgba(184,149,48,.2)}

/* ═══ SIDEBAR ═══ */
.sidebar{
  position:fixed;top:0;left:0;width:260px;height:100vh;
  background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;z-index:100;
}
.sidebar-header{padding:24px 20px 20px;display:flex;align-items:center;gap:12px}
.sidebar-header .logo{
  width:36px;height:36px;border-radius:8px;
  background:linear-gradient(135deg,var(--gold-light),var(--gold));
  display:flex;align-items:center;justify-content:center;
  font-size:20px;flex:none;
}
.sidebar-header .name{font-size:17px;font-weight:700}
.sidebar-header .tag{font-size:11px;color:var(--gold);font-weight:600}

.nav-section{padding:8px 0}
.nav-label{font-size:11px;font-weight:700;color:var(--hint);text-transform:uppercase;letter-spacing:.06em;padding:10px 20px 6px}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 20px;cursor:pointer;
  color:var(--mut);font-size:14px;font-weight:500;
  border-left:3px solid transparent;transition:.1s;
}
.nav-item:hover{color:var(--txt);background:var(--surface2)}
.nav-item.active{color:var(--gold);border-left-color:var(--gold);background:var(--gold-bg);font-weight:600}
.nav-item .dot{width:8px;height:8px;border-radius:50%;flex:none}
.nav-item .badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px}
.nav-sep{height:1px;background:var(--border);margin:10px 20px}
.sidebar-footer{margin-top:auto;padding:16px 20px;border-top:1px solid var(--border)}
.sidebar-footer .stat{display:flex;justify-content:space-between;font-size:12px;color:var(--hint);padding:3px 0}
.sidebar-footer .stat b{color:var(--txt);font-weight:700}

/* ═══ MAIN ═══ */
.main{margin-left:260px;min-height:100vh}

/* ═══ TOPBAR ═══ */
.topbar{
  position:sticky;top:0;z-index:50;
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:16px 32px;display:flex;align-items:center;gap:16px;
}
.topbar h1{font-size:20px;font-weight:700}
.topbar .sub{font-size:13px;color:var(--mut)}
.topbar .search{
  margin-left:auto;display:flex;align-items:center;gap:8px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;padding:0 14px;height:38px;width:240px;
}
.topbar .search input{border:0;outline:0;background:transparent;color:var(--txt);font-size:14px;width:100%}
.topbar .search svg{width:16px;height:16px;color:var(--hint);flex:none}

/* Theme toggle */
.theme-toggle{
  flex:none;width:38px;height:38px;border-radius:8px;
  border:1px solid var(--border);background:var(--surface2);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:.1s;color:var(--mut);
}
.theme-toggle:hover{color:var(--txt);border-color:var(--border2)}
.theme-toggle svg{width:18px;height:18px}
.theme-toggle .icon-moon{display:none}
.theme-toggle .icon-sun{display:block}
[data-theme="dark"] .theme-toggle .icon-moon{display:block}
[data-theme="dark"] .theme-toggle .icon-sun{display:none}
#refreshBtn svg{transition:transform .5s ease}
#refreshBtn.spinning svg{transform:rotate(360deg)}

/* ═══ ROSTER ═══ */
.roster{padding:32px}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:20px}

.member-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;overflow:hidden;cursor:pointer;transition:.12s;
}
.member-card:hover{border-color:var(--border2);box-shadow:0 4px 16px var(--shadow)}
.member-card .accent{height:4px;width:100%}
.member-card .mc-body{padding:20px 22px;display:flex;gap:16px;align-items:flex-start}
.member-card .mc-avatar{
  width:64px;height:64px;border-radius:12px;flex:none;overflow:hidden;
  border:1px solid var(--border);
}
.member-card .mc-avatar svg{width:100%;height:100%}
.member-card .mc-info{flex:1;min-width:0}
.member-card .mc-name{font-size:16px;font-weight:700;margin-bottom:3px}
.member-card .mc-role{font-size:12.5px;color:var(--mut);margin-bottom:10px}
.member-card .mc-skills{display:flex;flex-wrap:wrap;gap:5px}
.member-card .mc-tag{
  font-size:11px;background:var(--surface2);border:1px solid var(--border);
  color:var(--mut);border-radius:6px;padding:3px 8px;
}
.member-card .mc-tag.shared{color:var(--purple);border-color:rgba(124,93,200,.2)}
.member-card .mc-foot{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 22px;border-top:1px solid var(--border);
  background:var(--surface2);
}
.member-card .mc-model{font-size:12px;color:var(--hint);font-weight:600;text-transform:uppercase;letter-spacing:.03em}
.member-card .mc-nskills{font-size:12px;color:var(--gold);font-weight:700}
.member-card .mc-weapons{display:flex;gap:4px;align-items:center;margin-left:auto;margin-right:12px}
.member-card .mc-weapon{font-size:10px;font-weight:600;color:var(--hint);background:var(--surface);border:1px solid var(--border);padding:2px 7px;border-radius:4px}
.member-card .mc-weapon.primary{color:var(--gold);border-color:rgba(184,149,48,.3);background:var(--gold-bg)}

/* ═══ PROFILE ═══ */
.profile{padding:32px;display:none}
.profile.active{display:block}

.profile-top{display:flex;gap:24px;align-items:flex-start;margin-bottom:32px}
.profile-top .pt-avatar{
  width:110px;height:110px;border-radius:16px;flex:none;overflow:hidden;
  border:2px solid var(--border);
}
.profile-top .pt-avatar svg{width:100%;height:100%}
.profile-top .pt-info{flex:1}
.profile-top .pt-name{font-size:28px;font-weight:700;margin-bottom:5px}
.profile-top .pt-role{font-size:15px;color:var(--mut);margin-bottom:12px}
.profile-top .pt-tags{display:flex;gap:8px;flex-wrap:wrap}
.profile-top .pt-tag{
  font-size:12px;font-weight:600;padding:4px 12px;border-radius:6px;
  display:flex;align-items:center;gap:5px;border:1px solid var(--border);
}
.profile-top .pt-tag.model{background:var(--gold-bg);color:var(--gold)}
.profile-top .pt-tag.skills{background:var(--blue-bg);color:var(--blue)}
.profile-top .pt-tag.shared{background:var(--purple-bg);color:var(--purple)}
.profile-top .pt-back{
  cursor:pointer;font-size:14px;font-weight:600;color:var(--mut);
  border:1px solid var(--border);background:var(--surface);
  padding:8px 18px;border-radius:8px;transition:.1s;
}
.profile-top .pt-back:hover{color:var(--txt);border-color:var(--border2);background:var(--surface2)}

.profile-desc{font-size:15px;color:var(--mut);line-height:1.7;margin-bottom:32px;max-width:680px}

/* Sections */
.section{margin-bottom:32px}
.section-head{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.section-head h3{font-size:17px;font-weight:700}
.section-head .pill{font-size:12px;color:var(--hint);background:var(--surface2);border:1px solid var(--border);padding:3px 12px;border-radius:6px;font-weight:600}

/* Stats */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px}
.stat-card .sc-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
.stat-card .sc-name{font-size:13px;font-weight:600;color:var(--mut)}
.stat-card .sc-val{font-size:20px;font-weight:700}
.stat-bar{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;border:1px solid var(--border)}
.stat-bar .fill{height:100%;border-radius:3px;transition:.5s ease;width:0}

/* Skill pool */
.skill-list{display:flex;flex-direction:column;gap:10px}
.skill-row{
  display:grid;grid-template-columns:1.5fr auto auto 2.5fr;gap:18px;align-items:center;
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:16px 20px;transition:.1s;
}
.skill-row:hover{border-color:var(--border2);background:var(--surface2)}
.skill-row .sk-name{font-size:14px;font-weight:600}
.skill-row .sk-name.shared{color:var(--purple)}
.skill-row .sk-name .shared-mark{font-size:11px;opacity:.6;margin-left:8px;font-weight:400}
.skill-row .sk-type{
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;
  padding:3px 10px;border-radius:4px;
}
.skill-row .sk-type.own{background:var(--green-bg);color:var(--green)}
.skill-row .sk-type.vendored{background:var(--teal-bg);color:var(--teal)}
.skill-row .sk-type.external{background:var(--red-bg);color:var(--red)}
.skill-row .sk-ver{font-size:13px;color:var(--hint);font-family:ui-monospace,monospace}
.skill-row .sk-blurb{font-size:13px;color:var(--mut);line-height:1.5}

.skill-empty{
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:32px;text-align:center;
}
.skill-empty .se-icon{font-size:32px;margin-bottom:10px;opacity:.4}
.skill-empty .se-title{font-size:15px;font-weight:600;color:var(--mut);margin-bottom:6px}
.skill-empty .se-sub{font-size:13px;color:var(--hint);max-width:360px;margin:0 auto}

/* Arsenal */
.weapon-list{display:flex;flex-direction:column;gap:10px}
.weapon-row{display:grid;grid-template-columns:60px 140px 1fr;gap:16px;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 20px;transition:.1s}
.weapon-row:hover{border-color:var(--border2);background:var(--surface2)}
.wp-priority{font-size:11px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.04em}
.wp-name{font-size:14px;font-weight:700;color:var(--txt)}
.wp-desc{font-size:13px;color:var(--mut);line-height:1.5}

/* Deploy */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.info-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px}
.info-box .ib-label{font-size:11px;font-weight:700;color:var(--hint);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.info-box .ib-text{font-size:14px;color:var(--mut);line-height:1.6}

/* Does / Doesn't */
.does-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.does-col{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px}
.does-col h4{font-size:13px;font-weight:700;margin-bottom:12px}
.does-col h4.do{color:var(--green)}
.does-col h4.dont{color:var(--red)}
.does-col ul{list-style:none}
.does-col li{font-size:13px;color:var(--mut);padding:5px 0 5px 20px;position:relative;line-height:1.6}
.does-col li::before{position:absolute;left:0;font-weight:700}
.does-col.do li::before{content:'✓';color:var(--green)}
.does-col.dont li::before{content:'✗';color:var(--red)}

::-webkit-scrollbar{width:10px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:5px}

@media(max-width:768px){
  .sidebar{display:none}
  .main{margin-left:0}
  .card-grid{grid-template-columns:1fr}
  .info-grid,.does-grid{grid-template-columns:1fr}
  .stat-grid{grid-template-columns:1fr}
  .skill-row{grid-template-columns:1fr;gap:8px}
  .roster,.profile{padding:20px}
}
</style>
</head>

<div class="roster" id="rosterView">

<div class="profile" id="profileView">

const TYPE_LABEL={own:"OWN",vendored:"VENDORED",external:"EXTERNAL"};
const STAT_COLORS={Command:"#b89530",Strategy:"#7c5dc8",Speed:"#3da155",Precision:"#3b7dd8",Synergy:"#d54d7a",

const sharedCount={};
MEMBERS.forEach(m=>m.skills.forEach(s=>{sharedCount[s]=(sharedCount[s]||0)+1}));
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const statLabel=k=>k.replace(/_/g,' ');
const rosterView=document.getElementById('rosterView');
const profileView=document.getElementById('profileView');

function renderRoster(){
  const grid=document.getElementById('cardGrid');
  grid.innerHTML=MEMBERS.map(m=>{
    const tags=m.skills.slice(0,4).map(s=>`<span class="mc-tag${sharedCount[s]>1?' shared':''}">${esc(s)}</span>`).join('');
    const extra=m.skills.length>4?`<span class="mc-tag">+${m.skills.length-4}</span>`:'';
    return `<div class="member-card" data-m="${esc(m.name)}">
      <div class="accent" style="background:${m.color}"></div>
      <div class="mc-body">
        <div class="mc-avatar">${m.avatar}</div>
        <div class="mc-info">
          <div class="mc-name">${esc(m.name)}</div>
          <div class="mc-role">${esc(m.role.split('·')[0].trim())}</div>
          <div class="mc-skills">${tags}${extra}</div>
        </div>
      </div>
      <div class="mc-foot"><span class="mc-model">${m.model}</span><div class="mc-weapons">${m.weapons.map((w,i)=>`<span class="mc-weapon${i===0?' primary':''}">${w}</span>`).join('')}</div><span class="mc-nskills">${m.skills.length} skills</span></div>
    </div>`;
  }).join('');
  grid.querySelectorAll('.member-card').forEach(c=>c.addEventListener('click',()=>showProfile(c.dataset.m)));
}

function showProfile(name){
  const m=MEMBERS.find(x=>x.name===name);if(!m)return;
  const stats=Object.entries(m.stats);
  const statHTML=stats.map(([k,v])=>{const c=STAT_COLORS[k]||'#b89530';return `<div class="stat-card">
    <div class="sc-top"><span class="sc-name">${esc(statLabel(k))}</span><span class="sc-val">${v}</span></div>
    <div class="stat-bar"><div class="fill" style="background:${c};width:0" data-w="${v}"></div></div></div>`}).join('');

  let skillHTML;
  if(m.skills.length===0){
    skillHTML=`<div class="skill-empty"><div class="se-icon">⚔️</div><div class="se-title">No skills recruited yet</div><div class="se-sub">Skills to recruit: market analysis, backtesting framework, portfolio rebalancing, risk assessment</div></div>`;
  } else {
    skillHTML=`<div class="skill-list">${m.skills.map(s=>{const sk=SKILLS[s]||{type:"own",version:"?",blurb:""};const isShared=sharedCount[s]>1;return `<div class="skill-row">
      <span class="sk-name${isShared?' shared':''}">${esc(s)}${isShared?'<span class="shared-mark">⟂ shared</span>':''}</span>
      <span class="sk-type ${sk.type}">${TYPE_LABEL[sk.type]}</span>
      <span class="sk-ver">${esc(sk.version)}</span>
      <span class="sk-blurb">${esc(sk.blurb)}</span></div>`}).join('')}</div>`;
  }
  const sharedN=m.skills.filter(s=>sharedCount[s]>1).length;

  document.getElementById('profileContent').innerHTML=`
    <div class="profile-top">
      <div class="pt-avatar">${m.avatar}</div>
      <div class="pt-info">
        <div class="pt-name">${esc(m.name)}</div>
        <div class="pt-role">${esc(m.role)}</div>
        <div class="pt-tags">
          <span class="pt-tag model">● ${m.model}</span>
          <span class="pt-tag skills">● ${m.skills.length} skills</span>
          ${sharedN?`<span class="pt-tag shared">● ${sharedN} shared</span>`:''}
        </div>
      </div>
      <button class="pt-back" onclick="showRoster()">← Back</button>
    </div>
    <div class="profile-desc">${esc(m.desc)}</div>
    <div class="section"><div class="section-head"><h3>Stats</h3></div><div class="stat-grid">${statHTML}</div></div>
    <div class="section"><div class="section-head"><h3>Arsenal</h3><span class="pill">3 weapons</span></div><div class="weapon-list">${m.weapons.map((w,i)=>`<div class="weapon-row"><span class="wp-priority">${i===0?'1st':i===1?'2nd':'3rd'}</span><span class="wp-name">${w}</span><span class="wp-desc">${m.weaponsDesc[i]}</span></div>`).join('')}</div></div>
    <div class="section"><div class="section-head"><h3>Skill Pool</h3><span class="pill">${m.skills.length} skills</span></div>${skillHTML}</div>
    <div class="section"><div class="section-head"><h3>Deployment</h3></div><div class="info-grid">
      <div class="info-box"><div class="ib-label">Deploy When</div><div class="ib-text">${esc(m.deploy)}</div></div>
      <div class="info-box"><div class="ib-label">Triggers</div><div class="ib-text">${esc(m.triggers)}</div></div>
    </div></div>
    <div class="section"><div class="section-head"><h3>Role Boundaries</h3></div><div class="does-grid">
      <div class="does-col"><h4 class="do">✓ What They Do</h4><ul>${m.does.map(d=>`<li>${esc(d)}</li>`).join('')}</ul></div>
      <div class="does-col"><h4 class="dont">✗ What They Don't</h4><ul>${m.doesnt.map(d=>`<li>${esc(d)}</li>`).join('')}</ul></div>
    </div></div>`;

  rosterView.style.display='none';profileView.classList.add('active');
  document.getElementById('skillPoolView').style.display='none';
  document.getElementById('pageTitle').textContent=m.name;
  document.getElementById('pageSub').textContent=m.role;
  document.querySelectorAll('.sidebar .nav-item').forEach(n=>n.classList.remove('active'));
  setTimeout(()=>{document.querySelectorAll('.stat-bar .fill').forEach(f=>{f.style.width=f.dataset.w+'%'})},50);
}

function showRoster(){
  rosterView.style.display='block';profileView.classList.remove('active');
  document.getElementById('skillPoolView').style.display='none';
  document.getElementById('pageTitle').textContent='Guild Roster';
  document.getElementById('pageSub').textContent='9 members · 30 skills';
  document.querySelectorAll('.sidebar .nav-item').forEach(n=>n.classList.remove('active'));
  document.querySelector('.nav-item[data-view="roster"]').classList.add('active');
}

function showSkillPool(){
  rosterView.style.display='none';profileView.classList.remove('active');
  document.getElementById('skillPoolView').style.display='block';
  document.getElementById('pageTitle').textContent='Skill Pool';
  document.getElementById('pageSub').textContent='30 skills in the guild arsenal';
  document.querySelectorAll('.sidebar .nav-item').forEach(n=>n.classList.remove('active'));
  document.querySelector('.nav-item[data-view="skills"]').classList.add('active');
  const list=document.getElementById('skillPoolList');
  list.innerHTML=Object.entries(SKILLS).sort((a,b)=>a[0].localeCompare(b[0])).map(([name,sk])=>{
    const users=MEMBERS.filter(m=>m.skills.includes(name)).map(m=>m.name);
    const isShared=users.length>1;
    return `<div class="skill-row">
      <span class="sk-name${isShared?' shared':''}">${esc(name)}${isShared?`<span class="shared-mark">⟂ ${users.length} members</span>`:''}</span>
      <span class="sk-type ${sk.type}">${TYPE_LABEL[sk.type]}</span>
      <span class="sk-ver">${esc(sk.version)}</span>
      <span class="sk-blurb">${esc(sk.blurb)}${users.length?` · <span style="color:var(--hint)">used by: ${users.join(', ')}</span>`:' · <span style="color:var(--red)">unassigned</span>'}</span>
    </div>`}).join('');
}

function renderNav(){
  document.getElementById('navMembers').innerHTML=MEMBERS.map(m=>
    `<div class="nav-item" data-m="${esc(m.name)}"><span class="dot" style="background:${m.color}"></span> ${esc(m.name)}</div>`
  ).join('');
  document.querySelectorAll('#navMembers .nav-item').forEach(n=>n.addEventListener('click',()=>showProfile(n.dataset.m)));
  document.querySelector('.nav-item[data-view="roster"]').addEventListener('click',showRoster);
  document.querySelector('.nav-item[data-view="skills"]').addEventListener('click',showSkillPool);
}

document.getElementById('searchInput').addEventListener('input',e=>{
  const q=e.target.value.toLowerCase();
  document.querySelectorAll('.member-card').forEach(c=>{
    const m=MEMBERS.find(x=>x.name===c.dataset.m);
    if(!q){c.style.display='';return}
    c.style.display=(m.name+' '+m.role+' '+m.desc+' '+m.skills.join(' ')).toLowerCase().includes(q)?'':'none';
  });
});

renderRoster();renderNav();

// ── THEME TOGGLE ──
const themeToggle=document.getElementById('themeToggle');
function setTheme(dark){
  document.documentElement.setAttribute('data-theme',dark?'dark':'light');
  try{localStorage.setItem('sa-theme',dark?'dark':'light')}catch(e){}
}
// Load saved theme (defaults to system preference)
try{
  const saved=localStorage.getItem('sa-theme');
  if(saved==='dark')setTheme(true);
  else if(saved==='light')setTheme(false);
  else if(window.matchMedia('(prefers-color-scheme:dark)').matches)setTheme(true);
}catch(e){}
themeToggle.addEventListener('click',()=>{
  const isDark=document.documentElement.getAttribute('data-theme')==='dark';
  setTheme(!isDark);
});

// ── REFRESH ──
const refreshBtn=document.getElementById('refreshBtn');
refreshBtn.addEventListener('click',()=>{
  refreshBtn.classList.add('spinning');
  setTimeout(()=>refreshBtn.classList.remove('spinning'),500);
  // Reload the page to pick up any changes to skills-data.js or the HTML
  location.reload();
});
</script>
</body>

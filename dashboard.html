<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Star Alliance — Guild Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="dashboard.css" />
</head>
<body>
  <!-- ============== GUILD HEADER ============== -->
  <header class="guild-header">
    <div class="guild-header__inner">
      <div class="sigil" aria-hidden="true"><img class="sigil-img" src="art/logo.png" alt="Star Alliance" onerror="this.replaceWith(document.createTextNode('★'))"></div>
      <div class="guild-header__titles">
        <h1 class="guild-header__title">Star Alliance</h1>
        <p class="guild-header__sub">A guild of AI agents, working as one</p>
      </div>
      <div class='guild-header__butler'>
        <div>
          <div class='butler-name'>The Butler</div>
          <div class='butler-title'>Guild Voice</div>
        </div>
        <img class='butler-avatar' src='art/member-art/butler.png' alt='The Butler' onerror='this.style.display="none"'>
      </div>
      <div class="guild-header__tag">
        <span class="tag-version">v4</span>
        <span class="tag-date">June 29 2026</span>
      </div>
    </div>
  </header>

  <!-- ============== STATS BAR ============== -->
  <section class="stats-bar" aria-label="Guild statistics">
    <div class="stat-tile">
      <div class="stat-tile__num" id="stat-members">9</div>
      <div class="stat-tile__label">Members</div>
    </div>
    <div class="stat-tile">
      <div class="stat-tile__num" id="stat-skills">112</div>
      <div class="stat-tile__label">Skills</div>
    </div>
    <div class="stat-tile">
      <div class="stat-tile__num" id="stat-workflows">36</div>
      <div class="stat-tile__label">Workflows</div>
    </div>
    <div class="stat-tile">
      <div class="stat-tile__num" id="stat-active">3</div>
      <div class="stat-tile__label">Active Today</div>
    </div>
  </section>

  <main class="page">
    <!-- ============== THE ROSTER ============== -->
    <section class="section">
      <header class="section-head">
        <h2 class="section-title">The Roster</h2>
        <div class="section-rule"></div>
      </header>

      <div class="member-grid" id="member-grid"></div>
    </section>

    <!-- ============== DOMAIN PANEL ============== -->
    <section class="section">
      <header class="section-head">
        <h2 class="section-title">Domains</h2>
        <div class="section-rule"></div>
      </header>

      <div class="domain-grid" id="domain-grid"></div>
    </section>

    <!-- ============== LOWER DECK ============== -->
    <section class="lower-deck">
      <!-- Guild Log -->
      <div class="panel">
        <header class="section-head">
          <h2 class="section-title">Guild Log</h2>
          <div class="section-rule"></div>
        </header>
        <ul class="log-list" id="log-list"></ul>
      </div>

      <!-- Workflows -->
      <div class="panel">
        <header class="section-head">
          <h2 class="section-title">Workflows</h2>
          <div class="section-rule"></div>
        </header>
        <ul class="workflow-list" id="workflow-list"></ul>
      </div>
    </section>
  </main>

  <footer class="page-footer">
    <span>Star Alliance · <span id="footer-version">v4</span> · Guild Dashboard</span>
  </footer>
<script src="dashboard.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Star Alliance — Guild</title>
<style>
:root{
  --bg:#0a0a0b;
  --surface:#131316;
  --surface2:#1a1a1f;
  --surface3:#222228;
  --border:rgba(255,255,255,.06);
  --border2:rgba(255,255,255,.12);
  --txt:#f5f5f7;
  --mut:#8e8e93;
  --hint:#636366;
  --gold:#f0c75a;
  --gold-dim:#b8983a;
  --blue:#5e9ef5;
  --green:#4ec985;
  --purple:#a67cf2;
  --pink:#f2658a;
  --teal:#3ec5b8;
  --red:#f0564e;
  --radius:14px;
  --radius-sm:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--bg);color:var(--txt);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Inter,Roboto,sans-serif;
  font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
::selection{background:rgba(240,199,90,.25)}

/* ═══ SIDEBAR ═══ */
.sidebar{
  position:fixed;top:0;left:0;width:240px;height:100vh;
  background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;z-index:100;
}
.sidebar-header{padding:20px 18px 16px;display:flex;align-items:center;gap:10px}
.sidebar-header .logo{
  width:32px;height:32px;border-radius:8px;
  background:linear-gradient(135deg,var(--gold),var(--gold-dim));
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex:none;
}
.sidebar-header .name{font-size:16px;font-weight:700;letter-spacing:-.02em}
.sidebar-header .tag{font-size:10px;color:var(--gold);font-weight:600;letter-spacing:.05em;text-transform:uppercase}

.nav-section{padding:8px 0}
.nav-label{font-size:10px;font-weight:600;color:var(--hint);text-transform:uppercase;letter-spacing:.08em;padding:8px 18px 4px}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:8px 18px;cursor:pointer;
  color:var(--mut);font-size:13.5px;font-weight:500;
  border-left:2px solid transparent;transition:.1s;
}
.nav-item:hover{color:var(--txt);background:rgba(255,255,255,.03)}
.nav-item.active{color:var(--gold);border-left-color:var(--gold);background:rgba(240,199,90,.06)}
.nav-item .dot{width:7px;height:7px;border-radius:50%;flex:none}
.nav-item .badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px;min-width:20px;text-align:center}
.nav-sep{height:1px;background:var(--border);margin:8px 16px}
.sidebar-footer{margin-top:auto;padding:14px 18px;border-top:1px solid var(--border)}
.sidebar-footer .stat{display:flex;justify-content:space-between;font-size:11.5px;color:var(--hint);padding:2px 0}
.sidebar-footer .stat b{color:var(--txt);font-weight:600}

/* ═══ MAIN ═══ */
.main{margin-left:240px;min-height:100vh}

/* ═══ TOPBAR ═══ */
.topbar{
  position:sticky;top:0;z-index:50;
  background:rgba(10,10,11,.8);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:12px 28px;display:flex;align-items:center;gap:16px;
}
.topbar h1{font-size:18px;font-weight:700;letter-spacing:-.01em}
.topbar .sub{font-size:12px;color:var(--mut);margin-left:4px}
.topbar .search{
  margin-left:auto;display:flex;align-items:center;gap:8px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:0 12px;height:36px;width:220px;
}
.topbar .search input{border:0;outline:0;background:transparent;color:var(--txt);font-size:13px;width:100%}
.topbar .search svg{width:15px;height:15px;color:var(--hint);flex:none}

/* ═══ ROSTER VIEW ═══ */
.roster{padding:24px 28px}
.roster-head{display:flex;align-items:baseline;gap:12px;margin-bottom:20px}
.roster-head h2{font-size:22px;font-weight:700;letter-spacing:-.02em}
.roster-head .count{font-size:13px;color:var(--mut)}

.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}

.member-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;cursor:pointer;
  transition:.15s;position:relative;
}
.member-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.25)}
.member-card .accent{height:3px;width:100%}
.member-card .mc-body{padding:16px 18px;display:flex;gap:14px;align-items:flex-start}
.member-card .mc-avatar{
  width:56px;height:56px;border-radius:14px;flex:none;overflow:hidden;
  border:1px solid var(--border2);
}
.member-card .mc-avatar svg{width:100%;height:100%}
.member-card .mc-info{flex:1;min-width:0}
.member-card .mc-name{font-size:15px;font-weight:700;margin-bottom:2px}
.member-card .mc-role{font-size:11.5px;color:var(--mut);margin-bottom:8px;font-weight:500}
.member-card .mc-skills{display:flex;flex-wrap:wrap;gap:4px}
.member-card .mc-tag{
  font-size:10px;background:var(--surface3);border:1px solid var(--border);
  color:var(--mut);border-radius:6px;padding:2px 7px;font-weight:500;
}
.member-card .mc-tag.shared{color:var(--purple);border-color:rgba(166,124,242,.2)}
.member-card .mc-foot{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 18px;border-top:1px solid var(--border);
}
.member-card .mc-model{font-size:11px;color:var(--hint);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.member-card .mc-nskills{font-size:11px;color:var(--gold);font-weight:700}

/* ═══ PROFILE VIEW ═══ */
.profile{padding:24px 28px;display:none}
.profile.active{display:block}

.profile-top{
  display:flex;gap:20px;align-items:flex-start;margin-bottom:28px;
}
.profile-top .pt-avatar{
  width:96px;height:96px;border-radius:22px;flex:none;overflow:hidden;
  border:2px solid var(--border2);
}
.profile-top .pt-avatar svg{width:100%;height:100%}
.profile-top .pt-info{flex:1}
.profile-top .pt-name{font-size:26px;font-weight:700;letter-spacing:-.02em;margin-bottom:4px}
.profile-top .pt-role{font-size:14px;color:var(--mut);font-weight:500;margin-bottom:10px}
.profile-top .pt-tags{display:flex;gap:8px;flex-wrap:wrap}
.profile-top .pt-tag{
  font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;
  display:flex;align-items:center;gap:5px;
}
.profile-top .pt-tag.model{background:rgba(240,199,90,.12);color:var(--gold);border:1px solid rgba(240,199,90,.2)}
.profile-top .pt-tag.skills{background:rgba(94,158,245,.1);color:var(--blue);border:1px solid rgba(94,158,245,.2)}
.profile-top .pt-tag.shared{background:rgba(166,124,242,.1);color:var(--purple);border:1px solid rgba(166,124,242,.2)}
.profile-top .pt-back{
  cursor:pointer;font-size:13px;font-weight:600;color:var(--mut);
  border:1px solid var(--border2);background:var(--surface);
  padding:7px 16px;border-radius:var(--radius-sm);transition:.1s;
}
.profile-top .pt-back:hover{color:var(--txt);border-color:var(--border2);background:var(--surface2)}

.profile-desc{
  font-size:14.5px;color:var(--mut);line-height:1.6;
  margin-bottom:24px;max-width:640px;
}

/* Stats */
.section{margin-bottom:24px}
.section-head{
  display:flex;align-items:center;gap:8px;margin-bottom:12px;
}
.section-head h3{font-size:15px;font-weight:700;letter-spacing:-.01em}
.section-head .pill{font-size:11px;color:var(--hint);background:var(--surface2);border:1px solid var(--border);padding:2px 9px;border-radius:20px;font-weight:600}

.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.stat-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:14px;
}
.stat-card .sc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.stat-card .sc-name{font-size:12px;font-weight:600;color:var(--mut)}
.stat-card .sc-val{font-size:16px;font-weight:700;font-variant-numeric:tabular-nums}
.stat-bar{height:4px;background:var(--surface3);border-radius:2px;overflow:hidden}
.stat-bar .fill{height:100%;border-radius:2px;transition:.4s ease;width:0}

/* Skill pool */
.skill-list{display:flex;flex-direction:column;gap:8px}
.skill-row{
  display:grid;grid-template-columns:1fr auto auto 2fr;gap:14px;align-items:center;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:12px 16px;transition:.1s;
}
.skill-row:hover{border-color:var(--border2);background:var(--surface2)}
.skill-row .sk-name{font-size:13.5px;font-weight:600}
.skill-row .sk-name.shared{color:var(--purple)}
.skill-row .sk-name .shared-mark{font-size:10px;opacity:.6;margin-left:6px}
.skill-row .sk-type{
  font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;
  padding:2px 8px;border-radius:20px;
}
.skill-row .sk-type.own{background:rgba(78,201,133,.12);color:var(--green)}
.skill-row .sk-type.vendored{background:rgba(62,197,184,.12);color:var(--teal)}
.skill-row .sk-type.external{background:rgba(240,86,78,.12);color:var(--red)}
.skill-row .sk-ver{font-size:12px;color:var(--hint);font-family:ui-monospace,SFMono-Regular,monospace;font-variant-numeric:tabular-nums}
.skill-row .sk-blurb{font-size:12.5px;color:var(--mut);line-height:1.4}

.skill-empty{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:24px;text-align:center;
}
.skill-empty .se-icon{font-size:28px;margin-bottom:8px;opacity:.5}
.skill-empty .se-title{font-size:14px;font-weight:600;color:var(--mut);margin-bottom:4px}
.skill-empty .se-sub{font-size:12px;color:var(--hint);max-width:320px;margin:0 auto}

/* Deploy / triggers */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.info-box{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:16px;
}
.info-box .ib-label{font-size:10px;font-weight:700;color:var(--hint);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.info-box .ib-text{font-size:13px;color:var(--mut);line-height:1.55}

/* Does / Doesn't */
.does-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.does-col{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:16px;
}
.does-col h4{font-size:12px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.does-col h4.do{color:var(--green)}
.does-col h4.dont{color:var(--red)}
.does-col ul{list-style:none}
.does-col li{font-size:12.5px;color:var(--mut);padding:4px 0 4px 18px;position:relative;line-height:1.5}
.does-col li::before{position:absolute;left:0;font-weight:700;font-size:13px}
.does-col.do li::before{content:'✓';color:var(--green)}
.does-col.dont li::before{content:'✗';color:var(--red)}

/* Scrollbar */
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--border2)}

/* Responsive */
@media(max-width:768px){
  .sidebar{display:none}
  .main{margin-left:0}
  .card-grid{grid-template-columns:1fr}
  .info-grid,.does-grid{grid-template-columns:1fr}
  .stat-grid{grid-template-columns:1fr}
  .skill-row{grid-template-columns:1fr;gap:6px}
}
</style>
</head>

const TYPE_LABEL={own:"OWN",vendored:"VENDORED",external:"EXTERNAL"};
const STAT_COLORS={Command:"#f0c75a",Strategy:"#a67cf2",Speed:"#4ec985",Precision:"#5e9ef5",Synergy:"#f2658a",
  Design:"#f2658a",Architecture:"#5e9ef5",Database:"#5e9ef5",Coding:"#4ec985",Debugging:"#4ec985",
  Creativity:"#f2658a",Detail:"#3ec5b8",Planning:"#a67cf2",Endurance:"#e8b84e",Translation:"#d4a05a",
  Knowledge:"#d4a05a",Infrastructure:"#3ec5b8",Tooling:"#3ec5b8",Reliability:"#4ec985",
  Problem_Solving:"#5e9ef5",Analysis:"#4ec9a0",Risk:"#f0564e",Market:"#3ec5b8",
  Management:"#e8b84e"};

// Count shared
const sharedCount={};
MEMBERS.forEach(m=>m.skills.forEach(s=>{sharedCount[s]=(sharedCount[s]||0)+1}));

const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const statLabel=k=>k.replace(/_/g,' ');

const rosterView=document.getElementById('rosterView');
const profileView=document.getElementById('profileView');

// ── ROSTER ──
function renderRoster(){
  const grid=document.getElementById('cardGrid');
  grid.innerHTML=MEMBERS.map(m=>{
    const tags=m.skills.slice(0,4).map(s=>`<span class="mc-tag${sharedCount[s]>1?' shared':''}">${esc(s)}</span>`).join('');
    const extra=m.skills.length>4?`<span class="mc-tag">+${m.skills.length-4}</span>`:'';
    return `
    <div class="member-card" data-m="${esc(m.name)}">
      <div class="accent" style="background:${m.color}"></div>
      <div class="mc-body">
        <div class="mc-avatar">${m.avatar}</div>
        <div class="mc-info">
          <div class="mc-name">${esc(m.name)}</div>
          <div class="mc-role">${esc(m.role.split('·')[0].trim())}</div>
          <div class="mc-skills">${tags}${extra}</div>
        </div>
      </div>
      <div class="mc-foot">
        <span class="mc-model">${m.model}</span>
        <span class="mc-nskills">${m.skills.length} skills</span>
      </div>
    </div>`;
  }).join('');
  grid.querySelectorAll('.member-card').forEach(c=>{
    c.addEventListener('click',()=>showProfile(c.dataset.m));
  });
}

// ── PROFILE ──
function showProfile(name){
  const m=MEMBERS.find(x=>x.name===name);
  if(!m)return;

  const stats=Object.entries(m.stats);
  const statHTML=stats.map(([k,v])=>{
    const c=STAT_COLORS[k]||'#f0c75a';
    return `<div class="stat-card">
      <div class="sc-top"><span class="sc-name">${esc(statLabel(k))}</span><span class="sc-val">${v}</span></div>
      <div class="stat-bar"><div class="fill" style="background:${c};width:0" data-w="${v}"></div></div>
    </div>`;
  }).join('');

  let skillHTML;
  if(m.skills.length===0){
    skillHTML=`<div class="skill-empty">
      <div class="se-icon">⚔️</div>
      <div class="se-title">No skills recruited yet</div>
      <div class="se-sub">Skills to recruit: market analysis, backtesting framework, portfolio rebalancing, risk assessment</div>
    </div>`;
  } else {
    skillHTML=`<div class="skill-list">${m.skills.map(s=>{
      const sk=SKILLS[s]||{type:"own",version:"?",blurb:""};
      const isShared=sharedCount[s]>1;
      return `<div class="skill-row">
        <span class="sk-name${isShared?' shared':''}">${esc(s)}${isShared?'<span class="shared-mark">⟂ shared</span>':''}</span>
        <span class="sk-type ${sk.type}">${TYPE_LABEL[sk.type]}</span>
        <span class="sk-ver">${esc(sk.version)}</span>
        <span class="sk-blurb">${esc(sk.blurb)}</span>
      </div>`;
    }).join('')}</div>`;
  }

  const sharedCount_n=m.skills.filter(s=>sharedCount[s]>1).length;

  document.getElementById('profileContent').innerHTML=`
    <div class="profile-top">
      <div class="pt-avatar">${m.avatar}</div>
      <div class="pt-info">
        <div class="pt-name">${esc(m.name)}</div>
        <div class="pt-role">${esc(m.role)}</div>
        <div class="pt-tags">
          <span class="pt-tag model">● ${m.model}</span>
          <span class="pt-tag skills">● ${m.skills.length} skills</span>
          ${sharedCount_n?`<span class="pt-tag shared">● ${sharedCount_n} shared</span>`:''}
        </div>
      </div>
      <button class="pt-back" onclick="showRoster()">← Back</button>
    </div>
    <div class="profile-desc">${esc(m.desc)}</div>

    <div class="section">
      <div class="section-head"><h3>Stats</h3></div>
      <div class="stat-grid">${statHTML}</div>
    </div>

    <div class="section">
      <div class="section-head"><h3>Skill Pool</h3><span class="pill">${m.skills.length} skills</span></div>
      ${skillHTML}
    </div>

    <div class="section">
      <div class="section-head"><h3>Deployment</h3></div>
      <div class="info-grid">
        <div class="info-box"><div class="ib-label">Deploy When</div><div class="ib-text">${esc(m.deploy)}</div></div>
        <div class="info-box"><div class="ib-label">Triggers</div><div class="ib-text">${esc(m.triggers)}</div></div>
      </div>
    </div>

    <div class="section">
      <div class="section-head"><h3>Role Boundaries</h3></div>
      <div class="does-grid">
        <div class="does-col"><h4 class="do">✓ What They Do</h4><ul>${m.does.map(d=>`<li>${esc(d)}</li>`).join('')}</ul></div>
        <div class="does-col"><h4 class="dont">✗ What They Don't</h4><ul>${m.doesnt.map(d=>`<li>${esc(d)}</li>`).join('')}</ul></div>
      </div>
    </div>
  `;

  rosterView.style.display='none';
  profileView.classList.add('active');
  document.getElementById('pageTitle').textContent=m.name;
  document.getElementById('pageSub').textContent=m.role;
  document.querySelectorAll('.sidebar .nav-item').forEach(n=>n.classList.remove('active'));

  // Animate stat bars
  setTimeout(()=>{
    document.querySelectorAll('.stat-bar .fill').forEach(f=>{f.style.width=f.dataset.w+'%'});
  },50);
}

function showRoster(){
  rosterView.style.display='block';
  profileView.classList.remove('active');
  document.getElementById('pageTitle').textContent='Guild Roster';
  document.getElementById('pageSub').textContent='9 members · 29 skills';
  document.querySelectorAll('.sidebar .nav-item').forEach(n=>n.classList.remove('active'));
  document.querySelector('.nav-item[data-view="roster"]').classList.add('active');
}

// ── NAV ──
function renderNav(){
  const nav=document.getElementById('navMembers');
  nav.innerHTML=MEMBERS.map(m=>
    `<div class="nav-item" data-m="${esc(m.name)}"><span class="dot" style="background:${m.color}"></span> ${esc(m.name.replace('the ',''))}</div>`
  ).join('');
  nav.querySelectorAll('.nav-item').forEach(n=>{
    n.addEventListener('click',()=>showProfile(n.dataset.m));
  });
  document.querySelector('.nav-item[data-view="roster"]').addEventListener('click',showRoster);
}

// ── SEARCH ──
document.getElementById('searchInput').addEventListener('input',e=>{
  const q=e.target.value.toLowerCase();
  document.querySelectorAll('.member-card').forEach(c=>{
    const m=MEMBERS.find(x=>x.name===c.dataset.m);
    if(!q){c.style.display='';return}
    const text=(m.name+' '+m.role+' '+m.desc+' '+m.skills.join(' ')).toLowerCase();
    c.style.display=text.includes(q)?'':'none';
  });
});

// ── INIT ──
renderRoster();
renderNav();
</script>

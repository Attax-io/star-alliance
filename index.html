<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Star Alliance — Control Panel</title>
  <meta name="description" content="The Star Alliance control panel — agents, models, skills, projects, and workflows in one place.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="app.css">
  <!-- Critical boot styles: paint the deep-space background before app.css loads, so there is never a white flash. -->
  <style>
    html { background: #06080f; }
    body { margin: 0; color: #e8ecf5; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif; }
    #app:empty::after { content: "Booting console…"; display: block; padding: 18vh 0; text-align: center; color: #5a6480; letter-spacing: .12em; }
  </style>
</head>
<body>
  <!-- Flat ink backdrop — a single calm gradient lives in CSS (#starfield), no animated starfield. -->
  <div id="starfield" aria-hidden="true"></div>

  <a class="skip-link" href="#app">Skip to content</a>

  <header id="topbar" class="glass">
    <a class="brand" href="#/home" aria-label="Star Alliance home">
      <span class="brand-mark" aria-hidden="true">✦</span>
      <span class="brand-text">Star <em>Alliance</em></span>
      <span class="brand-ver" id="brand-ver" title="Project version — derived from the guild log"></span>
    </a>

    <nav id="nav" aria-label="Primary">
      <a href="#/home" data-nav="home">Home</a>
      <a href="#/agents" data-nav="members">Agents</a>
      <a href="#/models" data-nav="arsenal">Models</a>
      <a href="#/skills" data-nav="skills">Skills</a>
      <a href="#/projects" data-nav="domains">Projects</a>
      <a href="#/map" data-nav="map">Workflows</a>
      <a href="#/activity" data-nav="log">Activity</a>
      <a href="#/evolution" data-nav="evolution">Automation</a>
    </nav>

    <div class="topbar-actions">
      <button id="palette-trigger" class="palette-trigger" type="button"
              aria-keyshortcuts="Meta+K Control+K" aria-label="Open search (Command K)">
        <span aria-hidden="true">⌕</span>
        <span class="pt-label">Search</span>
        <kbd>⌘K</kbd>
      </button>
      <button id="nav-toggle" class="nav-toggle" type="button"
              aria-expanded="false" aria-controls="nav" aria-label="Toggle navigation">☰</button>
    </div>
  </header>

  <!-- The single mount point. Every view renders here. -->
  <!-- focus moves to the view heading on each route change (announces context); no broad aria-live,
       which would re-announce on every filter keystroke. -->
  <main id="app" tabindex="-1"></main>

  <footer id="footer" class="footer">
    <span id="footer-meta"></span>
  </footer>

  <!-- Command palette overlay (hidden until invoked). -->
  <div id="palette" class="palette" role="dialog" aria-modal="true" aria-label="Command palette" hidden></div>

  <noscript>
    <p style="padding:2rem;text-align:center">Star Alliance requires JavaScript.</p>
  </noscript>

  <!-- Load order is load-bearing: data global first, then the app. -->
  <script src="guild-data.js"></script>
  <!-- Full SKILL.md bodies for the in-panel reader (works on file://). -->
  <script src="skill-md.js"></script>
  <!-- Per-workflow markdown for the workflow detail page (works on file://). -->
  <script src="workflow-md.js"></script>
  <script defer src="app.js"></script>
</body>
</html>
